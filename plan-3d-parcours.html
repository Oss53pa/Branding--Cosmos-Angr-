*{margin:0;padding:0;box-sizing:border-box}
body{font-family:'Inter',sans-serif;background:#0a0a0f;color:#fff;overflow:hidden;height:100vh}
canvas{display:block}

.ui-top{position:fixed;top:0;left:0;right:0;z-index:100;display:flex;align-items:center;justify-content:space-between;padding:14px 20px;background:linear-gradient(to bottom,rgba(10,10,15,.95),transparent);pointer-events:none}
.ui-top>*{pointer-events:auto}
.ui-logo{font-family:'Cormorant Garamond',serif;font-size:17px;font-weight:300;letter-spacing:.06em}
.ui-logo span{color:#C9943A}
.ui-badge{font-size:9px;padding:4px 10px;border-radius:10px;background:rgba(201,148,58,.12);color:#C9943A;border:1px solid rgba(201,148,58,.2);letter-spacing:.08em;text-transform:uppercase}

.controls{position:fixed;bottom:16px;left:50%;transform:translateX(-50%);z-index:100;display:flex;gap:6px;background:rgba(15,15,22,.88);backdrop-filter:blur(10px);border:1px solid rgba(255,255,255,.07);border-radius:10px;padding:6px 10px}
.ctrl-btn{padding:5px 14px;border-radius:7px;font-size:10px;font-weight:500;cursor:pointer;border:1px solid rgba(255,255,255,.08);background:rgba(255,255,255,.04);color:rgba(255,255,255,.6);transition:all .2s;font-family:'Inter',sans-serif}
.ctrl-btn:hover{background:rgba(255,255,255,.08);color:#fff}
.ctrl-btn.active{background:rgba(201,148,58,.15);border-color:rgba(201,148,58,.35);color:#C9943A}

.journey-panel{position:fixed;top:60px;left:16px;z-index:100;background:rgba(12,12,18,.92);backdrop-filter:blur(12px);border:1px solid rgba(255,255,255,.07);border-radius:12px;padding:14px 16px;width:250px;max-height:calc(100vh - 140px);overflow-y:auto;display:none}
.journey-panel.visible{display:block}
.journey-panel::-webkit-scrollbar{width:3px}
.journey-panel::-webkit-scrollbar-thumb{background:rgba(201,148,58,.3);border-radius:3px}
.jp-title{font-size:9px;letter-spacing:.2em;text-transform:uppercase;color:#C9943A;margin-bottom:10px}
.jp-step{display:flex;gap:8px;margin-bottom:8px;cursor:pointer;padding:5px 7px;border-radius:7px;transition:background .2s}
.jp-step:hover{background:rgba(255,255,255,.05)}
.jp-step.active{background:rgba(201,148,58,.1)}
.jp-num{width:20px;height:20px;border-radius:50%;background:rgba(201,148,58,.15);border:1px solid rgba(201,148,58,.35);display:flex;align-items:center;justify-content:center;font-size:9px;font-weight:600;color:#C9943A;flex-shrink:0}
.jp-name{font-size:11px;font-weight:500;color:rgba(255,255,255,.8)}
.jp-desc{font-size:9px;color:rgba(255,255,255,.35);line-height:1.4;margin-top:2px}

.info-panel{position:fixed;bottom:16px;right:16px;z-index:100;background:rgba(12,12,18,.92);backdrop-filter:blur(12px);border:1px solid rgba(255,255,255,.07);border-radius:12px;padding:14px 16px;width:240px;display:none}
.info-panel.visible{display:block}
.info-cat{font-size:8px;letter-spacing:.15em;text-transform:uppercase;color:rgba(255,255,255,.3);margin-bottom:4px}
.info-name{font-family:'Cormorant Garamond',serif;font-size:20px;font-weight:300;margin-bottom:3px}
.info-area{font-size:11px;color:#C9943A;margin-bottom:8px}
.info-desc{font-size:10px;color:rgba(255,255,255,.45);line-height:1.55}

.loading{position:fixed;inset:0;z-index:1000;background:#0a0a0f;display:flex;align-items:center;justify-content:center;flex-direction:column;transition:opacity .6s}

// =============================================
// INIT
// =============================================
function init(){
  scene = new THREE.Scene();
  scene.background = new THREE.Color(0x0c0c14);

  camera = new THREE.PerspectiveCamera(45, innerWidth/innerHeight, 0.1, 500);
  camera.position.set(60, 80, 110);

  renderer = new THREE.WebGLRenderer({antialias:true});
  renderer.setSize(innerWidth, innerHeight);
  renderer.setPixelRatio(Math.min(devicePixelRatio,2));
  renderer.shadowMap.enabled = true;
  renderer.shadowMap.type = THREE.PCFSoftShadowMap;
  renderer.toneMapping = THREE.ACESFilmicToneMapping;
  renderer.toneMappingExposure = 1.1;
  document.body.appendChild(renderer.domElement);

  controls = new THREE.OrbitControls(camera, renderer.domElement);
  controls.enableDamping = true;
  controls.dampingFactor = 0.07;
  controls.maxPolarAngle = Math.PI/2.05;
  controls.minDistance = 10;
  controls.maxDistance = 180;
  controls.target.set(PW/2, 0, PH/2);

  raycaster = new THREE.Raycaster();
  mouse = new THREE.Vector2(-9,-9);

  addLights();
  loadPlanTexture();
  buildStores();
  buildJourney();
  setupJourneyUI();

  addEventListener('resize', ()=>{
    camera.aspect = innerWidth/innerHeight;
    camera.updateProjectionMatrix();
    renderer.setSize(innerWidth, innerHeight);
  });
  renderer.domElement.addEventListener('mousemove', onMove);
  renderer.domElement.addEventListener('click', onClk);

  animate();
}

// =============================================
// LIGHTS
// =============================================
function addLights(){
  scene.add(new THREE.AmbientLight(0x556688, 0.5));
  scene.add(new THREE.HemisphereLight(0x8899bb, 0x334422, 0.4));

  const sun = new THREE.DirectionalLight(0xfff4dd, 0.7);
  sun.position.set(80, 100, -40);
  sun.castShadow = true;
  sun.shadow.mapSize.set(2048,2048);
  const sc = sun.shadow.camera;
  sc.left=-80; sc.right=80; sc.top=80; sc.bottom=-80;
  scene.add(sun);

  scene.add(new THREE.DirectionalLight(0xaabbee, 0.25).position.set(-40,50,80));
}

    scene.add(floor);

    // Surrounding dark ground
    const gGeo = new THREE.PlaneGeometry(300, 300);
    const gMat = new THREE.MeshStandardMaterial({color:0x111118, roughness:0.95});
    const g = new THREE.Mesh(gGeo, gMat);
    g.rotation.x = -Math.PI/2;
    g.position.set(PW/2, -0.05, PH/2);
    g.receiveShadow = true;
    scene.add(g);

    setTimeout(()=> document.getElementById('loading').classList.add('hidden'), 400);
  }, undefined, ()=>{
    const geo = new THREE.PlaneGeometry(PW, PH);
    const mat = new THREE.MeshStandardMaterial({color:0x2a2a30, roughness:0.8});
    const floor = new THREE.Mesh(geo, mat);
    floor.rotation.x = -Math.PI/2;
    floor.position.set(PW/2, 0, PH/2);
    scene.add(floor);
    setTimeout(()=> document.getElementById('loading').classList.add('hidden'), 400);
  });
}

// =============================================
// STORE ZONES — FLAT (no 3D blocks)
// Contours au sol + zones cliquables planes
// =============================================
function buildStores(){
  storeData.forEach(sd => {
    const [name, cat, color, px1, py1, px2, py2, area, desc] = sd;

    const x1 = px1 * S, z1 = py1 * S;
    const x2 = px2 * S, z2 = py2 * S;
    const w = x2 - x1, d = z2 - z1;
    const cx = x1 + w/2, cz = z1 + d/2;

    // --- Zone plane au sol (très fine, cliquable) ---
    const geo = new THREE.PlaneGeometry(w, d);
    const mat = new THREE.MeshBasicMaterial({
      color: color,
      transparent: true,
      opacity: 0.18,
      side: THREE.DoubleSide,
      depthWrite: false,
    });
    const plane = new THREE.Mesh(geo, mat);
    plane.rotation.x = -Math.PI/2;
    plane.position.set(cx, 0.08, cz);
    plane.userData = {name, cat, area, desc, color, baseOpacity: 0.18};
    scene.add(plane);
    blocks.push(plane);

    // --- Contour lumineux au sol ---
    const outlineShape = new THREE.Shape();
    outlineShape.moveTo(-w/2, -d/2);
    outlineShape.lineTo(w/2, -d/2);
    outlineShape.lineTo(w/2, d/2);
    outlineShape.lineTo(-w/2, d/2);
    outlineShape.lineTo(-w/2, -d/2);

    const outlinePoints = outlineShape.getPoints(4);
    const outlineGeo = new THREE.BufferGeometry().setFromPoints(
      outlinePoints.map(p => new THREE.Vector3(p.x, 0, p.y))
    );
    const outlineMat = new THREE.LineBasicMaterial({
      color: color,
      transparent: true,
      opacity: 0.45,
    });
    const outline = new THREE.LineLoop(outlineGeo, outlineMat);
    outline.position.set(cx, 0.12, cz);
    scene.add(outline);

    // --- Label flottant avec le nom ---
    const label = makeSprite(name, color, 1024, 28);
    label.position.set(cx, 1.8, cz);
    const labelScale = Math.max(w, d) * 0.55;
    label.scale.set(labelScale, labelScale * 0.22, 1);
    scene.add(label);
  });
}

// =============================================
// CUSTOMER JOURNEY PATH
// =============================================
function buildJourney(){
  const pts = journey.map(j => new THREE.Vector3(j.px * S, 0.25, j.py * S));

  const curve = new THREE.CatmullRomCurve3(pts, false, 'catmullrom', 0.25);
  const tubeGeo = new THREE.TubeGeometry(curve, 300, 0.15, 8, false);
  const tubeMat = new THREE.MeshBasicMaterial({color:0xC9943A, transparent:true, opacity:0.8});
  journeyLine = new THREE.Mesh(tubeGeo, tubeMat);
  journeyLine.visible = false;
  scene.add(journeyLine);

  journey.forEach((j, i) => {
    const group = new THREE.Group();
    group.position.set(j.px * S, 0.05, j.py * S);

    const rGeo = new THREE.RingGeometry(0.55, 0.75, 24);
    const rMat = new THREE.MeshBasicMaterial({color:0xC9943A, transparent:true, opacity:0.5, side:THREE.DoubleSide});
    const ring = new THREE.Mesh(rGeo, rMat);
    ring.rotation.x = -Math.PI/2;
    group.add(ring);

    const dGeo = new THREE.CircleGeometry(0.45, 24);
    const dMat = new THREE.MeshBasicMaterial({color:0xC9943A, transparent:true, opacity:0.9, side:THREE.DoubleSide});
    const dot = new THREE.Mesh(dGeo, dMat);
    dot.rotation.x = -Math.PI/2;
    dot.position.y = 0.01;
    group.add(dot);

    const bGeo = new THREE.CylinderGeometry(0.06, 0.06, 4, 8);
    const bMat = new THREE.MeshBasicMaterial({color:0xC9943A, transparent:true, opacity:0.25});
    const beam = new THREE.Mesh(bGeo, bMat);
    beam.position.y = 2;
    group.add(beam);

    const sp = makeSprite(String(i+1), 0xC9943A, 512, 48);
    sp.position.y = 4.5;
    sp.scale.set(2, 0.5, 1);
    group.add(sp);

    const nl = makeSprite(j.n, 0xffffff, 1024, 32);
    nl.position.y = 5.5;
    nl.scale.set(4, 0.5, 1);
    group.add(nl);

    group.visible = false;
    scene.add(group);
    journeyDots.push(group);
  });
}

function makeSprite(text, color, canvasW, fontSize){
  const c = document.createElement('canvas');
  c.width = canvasW; c.height = 128;
  const ctx = c.getContext('2d');
  ctx.font = `600 ${fontSize}px Inter, sans-serif`;
  ctx.fillStyle = '#' + color.toString(16).padStart(6,'0');
  ctx.textAlign = 'center';
  ctx.textBaseline = 'middle';
  ctx.fillText(text, canvasW/2, 64);
  const tex = new THREE.CanvasTexture(c);
  const mat = new THREE.SpriteMaterial({map:tex, transparent:true, depthTest:false});
  return new THREE.Sprite(mat);
}

// =============================================
// INTERACTIONS
// =============================================
function onMove(e){
  mouse.x = (e.clientX/innerWidth)*2-1;
  mouse.y = -(e.clientY/innerHeight)*2+1;
  raycaster.setFromCamera(mouse, camera);
  const hits = raycaster.intersectObjects(blocks);

  if(hovered){
    hovered.material.opacity = hovered.userData.baseOpacity;
    hovered = null;
  }
  if(hits.length > 0){
    hovered = hits[0].object;
    hovered.material.opacity = 0.45;
    renderer.domElement.style.cursor = 'pointer';
  } else {
    renderer.domElement.style.cursor = 'default';
  }
}

function onClk(){
  if(hovered){
    const u = hovered.userData;
    document.getElementById('icat').textContent = u.cat.toUpperCase();
    document.getElementById('iname').textContent = u.name;
    document.getElementById('iarea').textContent = u.area;
    document.getElementById('idesc').textContent = u.desc;
    document.getElementById('ipanel').classList.add('visible');
  } else {
    document.getElementById('ipanel').classList.remove('visible');
  }
}

// =============================================
// CAMERA
// =============================================
function animCam(pos, tgt, dur=1000){
  const s = {x:camera.position.x,y:camera.position.y,z:camera.position.z,
             tx:controls.target.x,ty:controls.target.y,tz:controls.target.z};
  const t0 = performance.now();
  (function up(){
    const t = Math.min((performance.now()-t0)/dur,1);
    const e = t<.5?4*t*t*t:1-Math.pow(-2*t+2,3)/2;
    camera.position.set(s.x+(pos.x-s.x)*e, s.y+(pos.y-s.y)*e, s.z+(pos.z-s.z)*e);
    controls.target.set(s.tx+(tgt.x-s.tx)*e, s.ty+(tgt.y-s.ty)*e, s.tz+(tgt.z-s.tz)*e);
    if(t<1) requestAnimationFrame(up);
  })();
}

function viewTop(){ animCam({x:PW/2,y:90,z:PH/2+1},{x:PW/2,y:0,z:PH/2}); }
function viewPersp(){ animCam({x:-10,y:50,z:95},{x:PW/2,y:0,z:PH/2-5}); }
function viewFront(){ animCam({x:PW/2,y:25,z:-20},{x:PW/2,y:2,z:PH/2}); }
function viewSide(){ animCam({x:PW+30,y:30,z:PH/2},{x:PW/2,y:0,z:PH/2}); }

// =============================================
// JOURNEY UI
// =============================================
function toggleJourney(){
  journeyOn = !journeyOn;
  journeyLine.visible = journeyOn;
  journeyDots.forEach(d => d.visible = journeyOn);
  document.getElementById('jpanel').classList.toggle('visible', journeyOn);
  document.getElementById('btnJ').classList.toggle('active', journeyOn);
}

function setupJourneyUI(){
  const p = document.getElementById('jpanel');
  p.innerHTML = '<div class="jp-title">Parcours du consommateur</div>';
  journey.forEach((j, i) => {
    const el = document.createElement('div');
    el.className = 'jp-step';
    el.innerHTML = `<div class="jp-num">${i+1}</div><div><div class="jp-name">${j.n}</div><div class="jp-desc">${j.d}</div></div>`;
    el.onclick = () => goStep(i);
    p.appendChild(el);
  });
}

function goStep(i){
  document.querySelectorAll('.jp-step').forEach((el,idx)=> el.classList.toggle('active', idx===i));
  const j = journey[i];
  const cx = j.px * S, cz = j.py * S;
  animCam({x:cx-12, y:22, z:cz+15}, {x:cx, y:1, z:cz}, 900);

  // Highlight nearby zones
  blocks.forEach(b => {
    const dx = b.position.x - cx, dz = b.position.z - cz;
    const dist = Math.sqrt(dx*dx + dz*dz);
    b.material.opacity = dist < 12 ? 0.4 : 0.1;
  });
}

// =============================================
// ANIMATE
// =============================================
function animate(){
  requestAnimationFrame(animate);
  controls.update();

  if(journeyOn){
    const t = performance.now() * 0.003;
    journeyDots.forEach((g, i) => {
      g.children.forEach(c => {
        if(c.geometry && c.geometry.type === 'RingGeometry'){
          c.scale.setScalar(1 + Math.sin(t + i * 0.4) * 0.15);
          c.material.opacity = 0.3 + Math.sin(t + i * 0.4) * 0.2;
        }
      });
    });
  }

  renderer.render(scene, camera);
}

init();
</script>
