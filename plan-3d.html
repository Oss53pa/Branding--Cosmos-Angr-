// =============================================

const journey = [

  {n:"Dreamland",d:"1 125m² loisirs enfants · Attraction famille · Fidélisation", px:860,py:670},
  {n:"Zone d'Expo",d:"Espace polyvalent · Pop-up stores · Animations", px:550,py:680},
  {n:"Sports Bar",d:"200m² · Terrasse · Convivialité · Soirées", px:635,py:890},
  {n:"ibis / Adagio",d:"Hôtel ★★★ · Séjour & shopping · Business & tourisme", px:1020,py:1000},
  {n:"Sortie & Fidélisation",d:"E-services · App Cosmos · Programme fidélité · À bientôt", px:540,py:1200},

// =============================================
// INIT
// =============================================
function init(){
  scene = new THREE.Scene();
  scene.background = new THREE.Color(0x0c0c14);

  camera = new THREE.PerspectiveCamera(45, innerWidth/innerHeight, 0.1, 500);
  camera.position.set(60, 80, 110);

  renderer = new THREE.WebGLRenderer({antialias:true});
  renderer.setSize(innerWidth, innerHeight);
  renderer.setPixelRatio(Math.min(devicePixelRatio,2));
  renderer.shadowMap.enabled = true;
  renderer.shadowMap.type = THREE.PCFSoftShadowMap;
  renderer.toneMapping = THREE.ACESFilmicToneMapping;
  renderer.toneMappingExposure = 1.1;
  document.body.appendChild(renderer.domElement);

  controls = new THREE.OrbitControls(camera, renderer.domElement);
  controls.enableDamping = true;
  controls.dampingFactor = 0.07;
  controls.maxPolarAngle = Math.PI/2.05;
  controls.minDistance = 10;
  controls.maxDistance = 180;
  controls.target.set(PW/2, 0, PH/2);

  raycaster = new THREE.Raycaster();
  mouse = new THREE.Vector2(-9,-9);

  addLights();
  loadPlanTexture();
  buildStores();
  buildJourney();
  setupJourneyUI();

  addEventListener('resize', ()=>{
    camera.aspect = innerWidth/innerHeight;
    camera.updateProjectionMatrix();
    renderer.setSize(innerWidth, innerHeight);
  });
  renderer.domElement.addEventListener('mousemove', onMove);
  renderer.domElement.addEventListener('click', onClk);

  animate();
}

// =============================================
// LIGHTS
// =============================================
function addLights(){
  scene.add(new THREE.AmbientLight(0x556688, 0.5));
  scene.add(new THREE.HemisphereLight(0x8899bb, 0x334422, 0.4));

  const sun = new THREE.DirectionalLight(0xfff4dd, 0.7);
  sun.position.set(80, 100, -40);
  sun.castShadow = true;
  sun.shadow.mapSize.set(2048,2048);
  const sc = sun.shadow.camera;
  sc.left=-80; sc.right=80; sc.top=80; sc.bottom=-80;
  scene.add(sun);

  scene.add(new THREE.DirectionalLight(0xaabbee, 0.25).position.set(-40,50,80));
}

// =============================================
// PLAN IMAGE AS FLOOR TEXTURE
// =============================================
function loadPlanTexture(){
  const loader = new THREE.TextureLoader();
  loader.load('plan-cosmos.png', tex => {
    tex.encoding = THREE.sRGBEncoding;
    tex.anisotropy = renderer.capabilities.getMaxAnisotropy();

    // Floor with plan texture
    const geo = new THREE.PlaneGeometry(PW, PH);
    const mat = new THREE.MeshStandardMaterial({
      map: tex,
      roughness: 0.85,
      metalness: 0.05,
    });
    const floor = new THREE.Mesh(geo, mat);
    floor.rotation.x = -Math.PI/2;
    floor.position.set(PW/2, 0, PH/2);
    floor.receiveShadow = true;
    scene.add(floor);

    // Surrounding dark ground
    const gGeo = new THREE.PlaneGeometry(300, 300);
    const gMat = new THREE.MeshStandardMaterial({color:0x111118, roughness:0.95});
    const g = new THREE.Mesh(gGeo, gMat);
    g.rotation.x = -Math.PI/2;
    g.position.set(PW/2, -0.05, PH/2);
    g.receiveShadow = true;
    scene.add(g);

    setTimeout(()=> document.getElementById('loading').classList.add('hidden'), 400);
  }, undefined, ()=>{
    // Fallback: grey floor if image fails
    const geo = new THREE.PlaneGeometry(PW, PH);
    const mat = new THREE.MeshStandardMaterial({color:0x2a2a30, roughness:0.8});
    const floor = new THREE.Mesh(geo, mat);
    floor.rotation.x = -Math.PI/2;
    floor.position.set(PW/2, 0, PH/2);
    scene.add(floor);
    setTimeout(()=> document.getElementById('loading').classList.add('hidden'), 400);
  });
}

// =============================================
// 3D STORE BLOCKS
// =============================================
function buildStores(){
  storeData.forEach(sd => {
    const [name, cat, color, px1, py1, px2, py2, area, desc] = sd;

    const x1 = px1 * S, z1 = py1 * S;
    const x2 = px2 * S, z2 = py2 * S;
    const w = x2 - x1, d = z2 - z1;
    const h = getH(name, cat, area);

    const geo = new THREE.BoxGeometry(w, h, d);
    const mat = new THREE.MeshStandardMaterial({
      color: color,
      roughness: 0.55,
      metalness: 0.15,
      transparent: true,
      opacity: 0.6,
    });

    const mesh = new THREE.Mesh(geo, mat);
    mesh.position.set(x1 + w/2, h/2, z1 + d/2);
    mesh.castShadow = true;
    mesh.receiveShadow = true;
    mesh.userData = {name, cat, area, desc, color};

    // Edges
    const edges = new THREE.EdgesGeometry(geo);
    const eMat = new THREE.LineBasicMaterial({color:0xffffff, transparent:true, opacity:0.12});
    mesh.add(new THREE.LineSegments(edges, eMat));

    // Roof glow
    const rGeo = new THREE.PlaneGeometry(w * 0.95, d * 0.95);
    const rMat = new THREE.MeshBasicMaterial({color, transparent:true, opacity:0.15});
    const roof = new THREE.Mesh(rGeo, rMat);
    roof.rotation.x = -Math.PI/2;
    roof.position.y = h/2 + 0.02;
    mesh.add(roof);

    scene.add(mesh);
    blocks.push(mesh);
  });
}

function getH(name, cat, area){
  if(name.includes("ibis")) return 10;
  if(name==="Carrefour Market") return 5.5;
  if(name==="Kiabi") return 5;
  if(name==="Dreamland") return 6;
  if(name==="Craft Market") return 4.5;
  if(name==="Big Box 3") return 5;
  if(name==="City Sport") return 4;
  if(name.includes("Sports Bar")) return 4;
  if(name==="Oïmo Shoes") return 3.8;
  if(name==="Zone d'Expo") return 3.5;
  if(name==="Bonus") return 4;
  if(cat==="restaurant") return 3;
  if(name==="Lacoste"||name==="Jules") return 3.5;
  if(name.includes("Zino") && area.includes("332")) return 4;
  const a = parseInt(area) || 50;
  if(a > 150) return 3.5;
  if(a > 80) return 3;
  return 2.5;
}

// =============================================
// CUSTOMER JOURNEY PATH
// =============================================
function buildJourney(){
  const pts = journey.map(j => new THREE.Vector3(j.px * S, 0.25, j.py * S));

  // Smooth curve
  const curve = new THREE.CatmullRomCurve3(pts, false, 'catmullrom', 0.25);
  const tubeGeo = new THREE.TubeGeometry(curve, 300, 0.15, 8, false);
  const tubeMat = new THREE.MeshBasicMaterial({color:0xC9943A, transparent:true, opacity:0.8});
  journeyLine = new THREE.Mesh(tubeGeo, tubeMat);
  journeyLine.visible = false;
  scene.add(journeyLine);

  // Numbered dots
  journey.forEach((j, i) => {
    const group = new THREE.Group();
    group.position.set(j.px * S, 0.05, j.py * S);

    // Outer ring
    const rGeo = new THREE.RingGeometry(0.55, 0.75, 24);
    const rMat = new THREE.MeshBasicMaterial({color:0xC9943A, transparent:true, opacity:0.5, side:THREE.DoubleSide});
    const ring = new THREE.Mesh(rGeo, rMat);
    ring.rotation.x = -Math.PI/2;
    group.add(ring);

    // Inner dot
    const dGeo = new THREE.CircleGeometry(0.45, 24);
    const dMat = new THREE.MeshBasicMaterial({color:0xC9943A, transparent:true, opacity:0.9, side:THREE.DoubleSide});
    const dot = new THREE.Mesh(dGeo, dMat);
    dot.rotation.x = -Math.PI/2;
    dot.position.y = 0.01;
    group.add(dot);

    // Vertical beacon
    const bGeo = new THREE.CylinderGeometry(0.06, 0.06, 4, 8);
    const bMat = new THREE.MeshBasicMaterial({color:0xC9943A, transparent:true, opacity:0.25});
    const beam = new THREE.Mesh(bGeo, bMat);
    beam.position.y = 2;
    group.add(beam);

    // Number label
    const sp = makeSprite(String(i+1), 0xC9943A, 512, 48);
    sp.position.y = 4.5;
    sp.scale.set(2, 0.5, 1);
    group.add(sp);

    // Name label
    const nl = makeSprite(j.n, 0xffffff, 1024, 32);
    nl.position.y = 5.5;
    nl.scale.set(4, 0.5, 1);
    group.add(nl);

    group.visible = false;
    scene.add(group);
    journeyDots.push(group);
  });
}

function makeSprite(text, color, canvasW, fontSize){
  const c = document.createElement('canvas');
  c.width = canvasW; c.height = 128;
  const ctx = c.getContext('2d');
  ctx.font = `600 ${fontSize}px Inter, sans-serif`;
  ctx.fillStyle = '#' + color.toString(16).padStart(6,'0');
  ctx.textAlign = 'center';
  ctx.textBaseline = 'middle';
  ctx.fillText(text, canvasW/2, 64);
  const tex = new THREE.CanvasTexture(c);
  const mat = new THREE.SpriteMaterial({map:tex, transparent:true, depthTest:false});
  return new THREE.Sprite(mat);
}

// =============================================
// INTERACTIONS
// =============================================
function onMove(e){
  mouse.x = (e.clientX/innerWidth)*2-1;
  mouse.y = -(e.clientY/innerHeight)*2+1;
  raycaster.setFromCamera(mouse, camera);
  const hits = raycaster.intersectObjects(blocks);

  if(hovered){
    hovered.material.emissive.setHex(0x000000);
    hovered.material.opacity = 0.6;
    hovered = null;
  }
  if(hits.length > 0){
    hovered = hits[0].object;
    hovered.material.emissive.setHex(0x222222);
    hovered.material.opacity = 0.85;
    renderer.domElement.style.cursor = 'pointer';
  } else {
    renderer.domElement.style.cursor = 'default';
  }
}

function onClk(){
  if(hovered){
    const u = hovered.userData;
    document.getElementById('icat').textContent = u.cat.toUpperCase();
    document.getElementById('iname').textContent = u.name;
    document.getElementById('iarea').textContent = u.area;
    document.getElementById('idesc').textContent = u.desc;
    document.getElementById('ipanel').classList.add('visible');
  } else {
    document.getElementById('ipanel').classList.remove('visible');
  }
}

// =============================================
// CAMERA
// =============================================
function animCam(pos, tgt, dur=1000){
  const s = {x:camera.position.x,y:camera.position.y,z:camera.position.z,
             tx:controls.target.x,ty:controls.target.y,tz:controls.target.z};
  const t0 = performance.now();
  (function up(){
    const t = Math.min((performance.now()-t0)/dur,1);
    const e = t<.5?4*t*t*t:1-Math.pow(-2*t+2,3)/2;
    camera.position.set(s.x+(pos.x-s.x)*e, s.y+(pos.y-s.y)*e, s.z+(pos.z-s.z)*e);
    controls.target.set(s.tx+(tgt.x-s.tx)*e, s.ty+(tgt.y-s.ty)*e, s.tz+(tgt.z-s.tz)*e);
    if(t<1) requestAnimationFrame(up);
  })();
}

function viewTop(){ animCam({x:PW/2,y:90,z:PH/2+1},{x:PW/2,y:0,z:PH/2}); }
function viewPersp(){ animCam({x:-10,y:50,z:95},{x:PW/2,y:0,z:PH/2-5}); }
function viewFront(){ animCam({x:PW/2,y:25,z:-20},{x:PW/2,y:2,z:PH/2}); }
function viewSide(){ animCam({x:PW+30,y:30,z:PH/2},{x:PW/2,y:0,z:PH/2}); }

// =============================================
// JOURNEY UI
// =============================================
function toggleJourney(){
  journeyOn = !journeyOn;
  journeyLine.visible = journeyOn;
  journeyDots.forEach(d => d.visible = journeyOn);
  document.getElementById('jpanel').classList.toggle('visible', journeyOn);
  document.getElementById('btnJ').classList.toggle('active', journeyOn);
}

function setupJourneyUI(){
  const p = document.getElementById('jpanel');
  p.innerHTML = '<div class="jp-title">Parcours du consommateur</div>';
  journey.forEach((j, i) => {
    const el = document.createElement('div');
    el.className = 'jp-step';
    el.innerHTML = `<div class="jp-num">${i+1}</div><div><div class="jp-name">${j.n}</div><div class="jp-desc">${j.d}</div></div>`;
    el.onclick = () => goStep(i);
    p.appendChild(el);
  });
}

function goStep(i){
  document.querySelectorAll('.jp-step').forEach((el,idx)=> el.classList.toggle('active', idx===i));
  const j = journey[i];
  const cx = j.px * S, cz = j.py * S;
  animCam({x:cx-12, y:22, z:cz+15}, {x:cx, y:1, z:cz}, 900);

  // Highlight nearby blocks
  blocks.forEach(b => {
    const dx = b.position.x - cx, dz = b.position.z - cz;
    const dist = Math.sqrt(dx*dx + dz*dz);
    b.material.opacity = dist < 12 ? 0.85 : 0.35;
    b.material.emissive.setHex(dist < 8 ? 0x1a1a1a : 0x000000);
  });
}

// =============================================
// ANIMATE
// =============================================
function animate(){
  requestAnimationFrame(animate);
  controls.update();

  // Animate journey beacons
  if(journeyOn){
    const t = performance.now() * 0.003;
    journeyDots.forEach((g, i) => {
      g.children.forEach(c => {
        if(c.geometry && c.geometry.type === 'RingGeometry'){
          c.scale.setScalar(1 + Math.sin(t + i * 0.4) * 0.15);
          c.material.opacity = 0.3 + Math.sin(t + i * 0.4) * 0.2;
        }
      });
    });
  }

  renderer.render(scene, camera);
}

init();
</script>
